name: PR Agent Batch Review

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  batch_review:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/batch-review')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get changed files
        id: files
        run: |
          PR_NUMBER=$(jq -r .issue.number $GITHUB_EVENT_PATH)
          FILES=$(gh pr view $PR_NUMBER --json files -q '.files[].path')
          echo "$FILES" > all_files.txt
          # Split into batches of 30
          split -l 30 all_files.txt batch_
          ls batch_* > batch_list.txt
          cat batch_list.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review Batch 1
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG.AI_PROVIDER: "google"
          GOOGLE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.MODEL: "gemini/gemini-1.5-pro"
          PR_REVIEWER.MAX_FILES_TO_ANALYZE: "30"
          PR_REVIEWER.SKIP_FILES: ""

      - name: Wait 30 seconds
        run: sleep 30

      - name: Review Batch 2
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG.AI_PROVIDER: "google"
          GOOGLE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.MODEL: "gemini/gemini-1.5-pro"
          PR_REVIEWER.MAX_FILES_TO_ANALYZE: "30"
          PR_REVIEWER.FILE_FILTERS: "!src/components"  # skip already reviewed
