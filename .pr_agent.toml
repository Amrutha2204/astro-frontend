[config]
ai_provider = "google"
model = "gemini/gemini-2.0-flash"

[pr_reviewer]
require_security_review = true
require_estimate_effort_to_review = true
num_code_suggestions = 5
inline_code_comments = true

[pr_description]
publish_labels = true
generate_ai_title = true

[github_action_config]
auto_review = true
auto_describe = true
auto_improve = true
