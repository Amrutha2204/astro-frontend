[config]
ai_provider = "google"
model = "gemini/gemini-1.5-pro"
max_model_tokens = 100000

[pr_reviewer]
max_files_to_analyze = 30        # only 30 files per run
num_code_suggestions = 3
inline_code_comments = true

[ignore]
# Skip auto-generated or unimportant files
glob_patterns = [
    "*.lock",
    "*.min.js",
    "*.min.css",
    "dist/**",
    "build/**",
    "node_modules/**",
    "*.snap",
    "*.test.*"
]
